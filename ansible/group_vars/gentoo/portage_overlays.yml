---
portage_overlays:
  - name: guru
    packages:
      - app-office/obsidian
      - gui-apps/swaync
      - app-misc/nwg-look
      - media-fonts/source-han-serif
      - x11-themes/apple-cursor
      - x11-themes/materia-theme

  # Hyprland suite was last-rited in ::gentoo and ::guru; the community
  # maintains it here. See https://wiki.gentoo.org/wiki/Hyprland#Emerge
  - name: hyproverlay
    location: https://codeberg.org/hyproverlay/hyproverlay.git
    packages:
      - gui-wm/hyprland
      - gui-apps/hypridle
      - gui-apps/hyprlock
      - gui-apps/hyprpicker
      - gui-apps/hyprshot
      - gui-libs/xdg-desktop-portal-hyprland

  - name: gentoo-zh
    packages:
      - app-i18n/fcitx
      - app-i18n/fcitx-rime
      - app-i18n/fcitx-qt
      - app-i18n/fcitx-gtk
      - app-i18n/fcitx-configtool
      - net-misc/rustdesk

  - name: jaredallard
    location: https://github.com/jaredallard/overlay.git
    packages:
      - gui-apps/vicinae
